services:
  - type: web
    name: amazon-price-predictor-api
    runtime: python
    plan: starter          # free tier likely OOMs with torch + lightgbm + catboost loaded together
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "import nltk; nltk.download('stopwords'); nltk.download('punkt'); nltk.download('punkt_tab')"
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app --timeout 120
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"          # tighten to your Vercel URL after first deploy
      - key: PYTHON_VERSION
        value: 3.11.9
